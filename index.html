<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portal Futuros do Design</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍊</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
      /* ═══════════════════════════════════════════════════════════
         FUTUROS DO DESIGN — CESAR SCHOOL DESIGN SYSTEM
         Premium Educational Experience with CESAR Identity
         ═══════════════════════════════════════════════════════════ */
      
      :root {
        /* ═══ TYPOGRAPHY SYSTEM — Distinctive & Sophisticated ═══ */
        --font-display: 'Sora', -apple-system, system-ui, sans-serif;           /* Modern geometric display */
        --font-body: 'Manrope', -apple-system, system-ui, sans-serif;          /* Clean, professional body */
        --font-accent: 'Instrument Serif', Georgia, serif;                       /* Editorial elegance */
        
        /* ═══ CESAR SCHOOL COLOR IDENTITY ═══ */
        --c-orange-cesar: #ff6002;              /* Primary CESAR orange */
        --c-orange-vivid: #ff7722;              /* Brighter accent */
        --c-orange-deep: #e85500;               /* Deeper variation */
        --c-orange-soft: #ffaa66;               /* Soft complement */
        --c-orange-pale: #fff3eb;               /* Subtle background tint */
        
        /* ═══ EXTENDED PALETTE — Professional & Warm ═══ */
        --c-coral: #ff6b6b;                     /* Warm coral accent */
        --c-amber: #fbbf24;                     /* Golden amber */
        --c-rose: #fb7185;                      /* Rose accent */
        
        --c-charcoal: #1a1a1a;                  /* Deep charcoal */
        --c-slate: #334155;                     /* Professional slate */
        --c-stone: #78716c;                     /* Warm stone */
        --c-cloud: #f1f5f9;                     /* Light cloud */
        --c-ivory: #fffef9;                     /* Warm ivory */
        --c-white: #ffffff;                     /* Pure white */
        
        --c-border: #e2e8f0;
        --c-border-light: #f1f5f9;
        
        /* ═══ SOPHISTICATED GRADIENTS ═══ */
        --grad-orange-fire: linear-gradient(135deg, #ff6002 0%, #ff7722 50%, #fbbf24 100%);
        --grad-orange-soft: linear-gradient(135deg, #ff7722 0%, #ff6002 100%);
        --grad-orange-glow: linear-gradient(135deg, #fff3eb 0%, #fffef9 100%);
        --grad-coral-rose: linear-gradient(135deg, #ff6b6b 0%, #fb7185 100%);
        --grad-sunset: linear-gradient(135deg, #ff6002 0%, #ff6b6b 50%, #fb7185 100%);
        --grad-warmth: linear-gradient(180deg, #fffef9 0%, #fff3eb 50%, #f1f5f9 100%);
        
        /* ═══ LAYERED SHADOWS & DEPTH ═══ */
        --shadow-subtle: 0 1px 3px rgba(0, 0, 0, 0.05), 0 1px 2px rgba(0, 0, 0, 0.03);
        --shadow-soft: 0 4px 6px rgba(0, 0, 0, 0.05), 0 2px 4px rgba(0, 0, 0, 0.03);
        --shadow-medium: 0 10px 15px rgba(0, 0, 0, 0.08), 0 4px 6px rgba(0, 0, 0, 0.05);
        --shadow-large: 0 20px 25px rgba(0, 0, 0, 0.1), 0 10px 10px rgba(0, 0, 0, 0.06);
        --shadow-elevated: 0 25px 50px rgba(0, 0, 0, 0.12), 0 12px 24px rgba(0, 0, 0, 0.08);
        --shadow-dramatic: 0 35px 60px rgba(0, 0, 0, 0.15), 0 15px 30px rgba(0, 0, 0, 0.1);
        
        /* Orange-tinted shadows for brand consistency */
        --shadow-orange-soft: 0 8px 20px rgba(255, 96, 2, 0.15), 0 3px 8px rgba(255, 96, 2, 0.1);
        --shadow-orange-glow: 0 0 30px rgba(255, 96, 2, 0.25), 0 0 60px rgba(255, 119, 34, 0.15);
        --shadow-orange-intense: 0 12px 30px rgba(255, 96, 2, 0.3), 0 5px 15px rgba(255, 96, 2, 0.2);
        
        /* ═══ REFINED SPACING SCALE ═══ */
        --space-xs: 0.25rem;      /* 4px */
        --space-sm: 0.5rem;       /* 8px */
        --space-md: 1rem;         /* 16px */
        --space-lg: 1.5rem;       /* 24px */
        --space-xl: 2rem;         /* 32px */
        --space-2xl: 3rem;        /* 48px */
        --space-3xl: 4rem;        /* 64px */
        --space-4xl: 6rem;        /* 96px */
        --space-5xl: 8rem;        /* 128px */
        
        /* ═══ BORDER RADIUS SYSTEM ═══ */
        --radius-xs: 4px;
        --radius-sm: 8px;
        --radius-md: 12px;
        --radius-lg: 16px;
        --radius-xl: 24px;
        --radius-2xl: 32px;
        --radius-full: 9999px;
        
        /* ═══ SOPHISTICATED TRANSITIONS ═══ */
        --trans-snap: 0.1s cubic-bezier(0.4, 0, 0.2, 1);                  /* Instant feedback */
        --trans-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);                  /* Quick interactions */
        --trans-smooth: 0.3s cubic-bezier(0.4, 0, 0.2, 1);                /* Standard smooth */
        --trans-elegant: 0.4s cubic-bezier(0.4, 0, 0.2, 1);               /* Refined motion */
        --trans-luxe: 0.6s cubic-bezier(0.4, 0, 0.2, 1);                  /* Luxurious feel */
        --trans-spring: 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);           /* Bouncy spring */
        --trans-elastic: 0.7s cubic-bezier(0.68, -0.55, 0.265, 1.55);     /* Elastic effect */

        /* ═══ DARK THEME — Futuristic Base ═══ */
        --c-dark-base: #060608;
        --c-dark-elevated: #0d0d11;
        --c-dark-surface: #13131a;
        --c-dark-card: rgba(11, 11, 17, 0.96);
        --c-dark-border: rgba(255, 96, 2, 0.13);
        --c-dark-border-bright: rgba(255, 96, 2, 0.5);
        --c-text-primary: #ede8df;
        --c-text-secondary: rgba(237, 232, 223, 0.62);
        --c-text-muted: rgba(237, 232, 223, 0.35);

        /* ═══ NEON GLOW SHADOWS ═══ */
        --shadow-neon-orange: 0 0 20px rgba(255, 96, 2, 0.45), 0 0 60px rgba(255, 96, 2, 0.15), 0 4px 16px rgba(0,0,0,0.7);
        --shadow-neon-intense: 0 0 30px rgba(255, 119, 34, 0.65), 0 0 80px rgba(255, 96, 2, 0.22), 0 4px 24px rgba(0,0,0,0.8);
        --shadow-neon-subtle: 0 0 12px rgba(255, 96, 2, 0.2), 0 2px 8px rgba(0, 0, 0, 0.65);
        --shadow-dark-card: 0 4px 24px rgba(0, 0, 0, 0.65), 0 1px 4px rgba(0, 0, 0, 0.45), inset 0 1px 0 rgba(255,255,255,0.03);
        --shadow-dark-elevated: 0 12px 40px rgba(0, 0, 0, 0.75), 0 4px 16px rgba(0, 0, 0, 0.5);

        /* ═══ DARK-COMPAT ALIASES (override legacy light vars) ═══ */
        --c-orange: var(--c-orange-cesar);          /* Alias — var(--c-orange) now works */
        --c-black: var(--c-text-primary);            /* text-black → readable on dark bg */
        --c-neutral: var(--c-text-secondary);        /* text-neutral → readable on dark bg */
        --c-gray: rgba(237, 232, 223, 0.18);         /* avatar bg / misc gray on dark */
        --c-border: rgba(255, 96, 2, 0.1);           /* override light #e2e8f0 */
        --c-border-light: rgba(255, 255, 255, 0.04); /* override light #f1f5f9 */
        --c-off-white: var(--c-dark-base);           /* off-white → dark base */
      }

      /* ═══════════════════════════════════════════════════════════
         BASE FOUNDATION & RESET
         ═══════════════════════════════════════════════════════════ */
      
      * { 
        box-sizing: border-box; 
        margin: 0; 
        padding: 0; 
      }
      
      body {
        font-family: var(--font-body);
        background: var(--c-dark-base);
        color: var(--c-text-secondary);
        line-height: 1.65;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        position: relative;
      }
      
      /* Atmospheric neon glow layer — dark futuristic */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background-image:
          radial-gradient(ellipse 60% 50% at 12% 18%, rgba(255, 96, 2, 0.2) 0%, transparent 55%),
          radial-gradient(ellipse 50% 45% at 88% 78%, rgba(255, 119, 34, 0.14) 0%, transparent 50%),
          radial-gradient(ellipse 40% 35% at 55% 100%, rgba(232, 85, 0, 0.12) 0%, transparent 50%),
          radial-gradient(ellipse 30% 25% at 72% 8%, rgba(251, 191, 36, 0.07) 0%, transparent 40%);
        pointer-events: none;
        z-index: 0;
      }
      
      /* Futuristic tech grid overlay */
      body::after {
        content: '';
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(255, 96, 2, 0.045) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 96, 2, 0.045) 1px, transparent 1px);
        background-size: 56px 56px;
        pointer-events: none;
        z-index: 0;
      }
      
      button { 
        cursor: pointer; 
        border: none; 
        background: none; 
        font-family: inherit;
        transition: var(--trans-smooth);
      }
      
      a { 
        text-decoration: none; 
        color: inherit;
        transition: var(--trans-smooth);
      }
      
      /* ═══ CESAR-BRANDED SCROLLBAR ═══ */
      ::-webkit-scrollbar { 
        width: 12px; 
        height: 12px; 
      }
      
      ::-webkit-scrollbar-track { 
        background: var(--c-dark-elevated);
        border-left: 1px solid var(--c-dark-border);
      }
      
      ::-webkit-scrollbar-thumb { 
        background: rgba(255, 96, 2, 0.35);
        border: 2px solid var(--c-dark-elevated);
        border-radius: var(--radius-full);
        transition: var(--trans-smooth);
      }
      
      ::-webkit-scrollbar-thumb:hover { 
        background: var(--c-orange-cesar);
        box-shadow: var(--shadow-neon-subtle);
      }

      /* ═══════════════════════════════════════════════════════════
         TYPOGRAPHY SYSTEM — Editorial Excellence
         ═══════════════════════════════════════════════════════════ */
      
      h1, h2, h3 {
        font-family: var(--font-display);
        font-weight: 700;
        line-height: 1.15;
        letter-spacing: -0.02em;
        color: var(--c-text-primary);
      }
      
      h1 {
        font-size: clamp(2rem, 5vw, 3.5rem);
        font-weight: 800;
        background: var(--grad-orange-fire);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      
      h2 {
        font-size: clamp(1.5rem, 3vw, 2.5rem);
        color: var(--c-orange-cesar);
        text-shadow: 0 0 30px rgba(255, 96, 2, 0.25);
      }
      
      h3 {
        font-size: clamp(1.25rem, 2vw, 1.875rem);
      }
      
      p {
        font-family: var(--font-body);
        font-size: 1rem;
        line-height: 1.75;
        color: var(--c-text-secondary);
      }
      
      .font-accent {
        font-family: var(--font-accent);
        font-style: italic;
      }

      /* Utilities */
      .flex { display: flex; }
      .flex-col { flex-direction: column; }
      .items-center { align-items: center; }
      .justify-center { justify-content: center; }
      .justify-between { justify-content: space-between; }
      .gap-1 { gap: 0.25rem; }
      .gap-2 { gap: 0.5rem; }
      .gap-3 { gap: 1rem; }
      .gap-4 { gap: 1.5rem; }
      .gap-6 { gap: 2rem; }
      .gap-8 { gap: 3rem; }
      .w-full { width: 100%; }
      .h-full { height: 100%; }
      .text-center { text-align: center; }
      .font-bold { font-weight: 700; }
      .font-extrabold { font-weight: 800; }
      .uppercase { text-transform: uppercase; }
      .tracking-wide { letter-spacing: 0.05em; }
      .cursor-pointer { cursor: pointer; }
      .relative { position: relative; }
      .absolute { position: absolute; }
      .hidden { display: none; }
      
      /* --- TYPOGRAPHY --- */
      .text-xs { font-size: 0.75rem; }
      .text-sm { font-size: 0.875rem; }
      .text-base { font-size: 1rem; }
      .text-lg { font-size: 1.125rem; }
      .text-xl { font-size: 1.25rem; }
      .text-2xl { font-size: 1.5rem; }
      .text-3xl { font-size: 1.875rem; }
      .text-4xl { font-size: 2.25rem; }
      
      .text-orange { color: var(--c-orange); }
      .text-black { color: var(--c-black); }
      .text-neutral { color: var(--c-neutral); }
      .text-white { color: var(--c-white); }

      /* ═══════════════════════════════════════════════════════════
         BUTTON SYSTEM — CESAR Branded Interactions
         ═══════════════════════════════════════════════════════════ */
      
      .btn {
        position: relative;
        padding: 0.875rem 1.75rem;
        font-family: var(--font-display);
        font-weight: 700;
        font-size: 0.8125rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        border-radius: var(--radius-sm);
        transition: all var(--trans-elegant);
        display: inline-flex;
        align-items: center;
        gap: 0.625rem;
        justify-content: center;
        overflow: hidden;
        z-index: 1;
      }
      
      /* Animated shine effect on hover */
      .btn::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.25);
        transform: translate(-50%, -50%);
        transition: width 0.6s, height 0.6s;
        z-index: -1;
      }
      
      .btn:hover::before {
        width: 350px;
        height: 350px;
      }
      
      .btn-primary {
        background: var(--grad-orange-soft);
        color: var(--c-white);
        box-shadow: var(--shadow-neon-subtle);
        border: 1px solid rgba(255, 119, 34, 0.5);
      }
      
      .btn-primary:hover {
        transform: translateY(-3px);
        box-shadow: var(--shadow-neon-orange);
        background: var(--grad-orange-fire);
      }
      
      .btn-primary:active {
        transform: translateY(-1px);
        box-shadow: var(--shadow-neon-subtle);
      }
      
      .btn-primary:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }
      
      .btn-secondary {
        background: rgba(255, 96, 2, 0.08);
        color: var(--c-orange-cesar);
        border: 1px solid rgba(255, 96, 2, 0.38);
        box-shadow: none;
      }
      
      .btn-secondary:hover {
        background: rgba(255, 96, 2, 0.15);
        border-color: var(--c-orange-cesar);
        transform: translateY(-3px);
        box-shadow: var(--shadow-neon-subtle);
        color: var(--c-orange-vivid);
      }
      
      .btn-ghost {
        color: var(--c-text-secondary);
        background: transparent;
        border: 1px solid transparent;
      }
      
      .btn-ghost:hover {
        background: rgba(255, 96, 2, 0.1);
        color: var(--c-orange-cesar);
        border-color: rgba(255, 96, 2, 0.35);
      }
      
      /* ═══════════════════════════════════════════════════════════
         CARD SYSTEM — Content Containers
         ═══════════════════════════════════════════════════════════ */
      
      .card {
        position: relative;
        background: var(--c-dark-card);
        border: 1px solid var(--c-dark-border);
        border-radius: var(--radius-xl);
        padding: var(--space-xl);
        transition: all var(--trans-elegant);
        overflow: hidden;
        z-index: 1;
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        box-shadow: var(--shadow-dark-card);
      }
      
      /* Neon top border on hover */
      .card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 1px;
        background: linear-gradient(90deg, transparent 0%, var(--c-orange-cesar) 30%, var(--c-orange-vivid) 50%, var(--c-orange-cesar) 70%, transparent 100%);
        opacity: 0;
        transition: opacity var(--trans-smooth);
        z-index: 2;
      }
      
      /* Neon corner glow */
      .card::after {
        content: '';
        position: absolute;
        top: -1px;
        right: -1px;
        width: 100px;
        height: 100px;
        background: radial-gradient(circle at top right, rgba(255, 96, 2, 0.12) 0%, transparent 65%);
        opacity: 0;
        transition: opacity var(--trans-elegant);
        pointer-events: none;
      }
      
      .card:hover {
        transform: translateY(-5px);
        box-shadow: var(--shadow-dark-elevated), 0 0 30px rgba(255, 96, 2, 0.1);
        border-color: rgba(255, 96, 2, 0.4);
      }
      
      .card:hover::before {
        opacity: 1;
      }
      
      .card:hover::after {
        opacity: 1;
      }
      
      /* ═══════════════════════════════════════════════════════════
         INPUT SYSTEM — Form Elements
         ═══════════════════════════════════════════════════════════ */
      
      .input-field {
        width: 100%;
        padding: 1rem 1.25rem;
        border-radius: var(--radius-md);
        border: 1px solid var(--c-dark-border);
        background: rgba(8, 8, 14, 0.85);
        font-family: var(--font-body);
        font-size: 1rem;
        color: var(--c-text-primary);
        transition: all var(--trans-smooth);
        outline: none;
      }
      
      .input-field::placeholder {
        color: var(--c-text-muted);
        font-style: italic;
      }
      
      .input-field:hover {
        border-color: rgba(255, 96, 2, 0.28);
        background: rgba(10, 10, 16, 0.9);
      }
      
      .input-field:focus {
        background: rgba(10, 10, 16, 0.95);
        border-color: var(--c-orange-cesar);
        box-shadow: 0 0 0 3px rgba(255, 96, 2, 0.12), var(--shadow-neon-subtle);
        transform: translateY(-1px);
      }

      /* ═══════════════════════════════════════════════════════════
         BADGE SYSTEM — Status & Labels
         ═══════════════════════════════════════════════════════════ */

      .badge {
        padding: 0.375rem 0.875rem;
        border-radius: var(--radius-xs);
        font-family: var(--font-display);
        font-size: 0.7rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        display: inline-flex;
        align-items: center;
        gap: 0.375rem;
        transition: all var(--trans-snap);
        border: 1px solid transparent;
      }
      
      .badge:hover {
        transform: translateY(-2px) scale(1.05);
        box-shadow: var(--shadow-soft);
      }
      
      .badge-A { 
        background: rgba(255, 96, 2, 0.12);
        color: var(--c-orange-vivid);
        border-color: rgba(255, 96, 2, 0.35);
      }
      
      .badge-A:hover {
        box-shadow: 0 0 12px rgba(255, 96, 2, 0.3);
        background: rgba(255, 96, 2, 0.2);
        transform: translateY(-2px) scale(1.05);
      }
      
      .badge-B { 
        background: rgba(251, 113, 133, 0.12);
        color: #fb7185;
        border-color: rgba(251, 113, 133, 0.35);
      }
      
      .badge-B:hover {
        box-shadow: 0 0 12px rgba(251, 113, 133, 0.3);
        background: rgba(251, 113, 133, 0.2);
        transform: translateY(-2px) scale(1.05);
      }
      
      .badge-neutral { 
        background: rgba(255, 255, 255, 0.06);
        color: var(--c-text-secondary);
        border-color: rgba(255, 255, 255, 0.12);
      }

      
      /* Animations & Effects */
      @keyframes fade-in {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      
      @keyframes slide-in-left {
        from {
          opacity: 0;
          transform: translateX(-20px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
      
      @keyframes slide-in-right {
        from {
          opacity: 0;
          transform: translateX(20px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
      
      @keyframes scale-in {
        from {
          opacity: 0;
          transform: scale(0.95);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
      
      @keyframes glow-pulse {
        0%, 100% {
          box-shadow: 0 0 20px var(--c-orange-glow);
        }
        50% {
          box-shadow: 0 0 40px var(--c-orange-glow), 0 0 60px rgba(255, 96, 2, 0.2);
        }
      }
      
      .fade-in {
        animation: fade-in 0.4s cubic-bezier(0.4, 0, 0.2, 1) both;
      }
      
      .slide-in-left {
        animation: slide-in-left 0.4s cubic-bezier(0.4, 0, 0.2, 1) both;
      }
      
      .slide-in-right {
        animation: slide-in-right 0.4s cubic-bezier(0.4, 0, 0.2, 1) both;
      }
      
      .scale-in {
        animation: scale-in 0.3s cubic-bezier(0.4, 0, 0.2, 1) both;
      }
      
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      
      .animate-spin {
        animation: spin 1s linear infinite;
      }
      
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
      
      .animate-pulse {
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }

      /* ═══════════════════════════════════════════════════════════
         LAYOUT ARCHITECTURE
         ═══════════════════════════════════════════════════════════ */
      
      .app-layout { 
        display: flex; 
        height: 100vh; 
        overflow: hidden;
        position: relative;
        z-index: 1;
      }
      
      .sidebar-container { 
        width: 280px; 
        background: rgba(6, 6, 10, 0.98);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border-right: 1px solid rgba(255, 96, 2, 0.14); 
        display: flex; 
        flex-direction: column;
        flex-shrink: 0;
        z-index: 50;
        box-shadow: 4px 0 40px rgba(0, 0, 0, 0.85), 1px 0 0 rgba(255, 96, 2, 0.08);
      }
      
      .main-content { 
        flex: 1; 
        display: flex; 
        flex-direction: column; 
        overflow: hidden; 
        position: relative;
        z-index: 1;
      }
      
      /* Mobile Responsive */
      @media (max-width: 768px) {
        .sidebar-container {
          position: fixed;
          height: 100%;
          transform: translateX(-100%);
          transition: transform 0.3s ease;
        }
        .sidebar-container.open { transform: translateX(0); }
        .mobile-overlay {
          position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 40;
        }
        .mobile-header {
          display: flex; align-items: center; justify-content: space-between;
          height: 64px; padding: 0 1rem; background: rgba(6, 6, 10, 0.98); border-bottom: 1px solid rgba(255, 96, 2, 0.14);
        }
      }
      @media (min-width: 769px) {
        .mobile-header { display: none; }
        .mobile-overlay { display: none; }
      }

      /* ═══════════════════════════════════════════════════════════
         CHAT INTERFACE — Conversational Design
         ═══════════════════════════════════════════════════════════ */
      
      .chat-messages { 
        flex: 1; 
        overflow-y: auto; 
        padding: var(--space-2xl); 
        display: flex; 
        flex-direction: column; 
        gap: var(--space-xl);
      }
      
      .msg-row { 
        display: flex; 
        gap: var(--space-md); 
        align-items: flex-start; 
        max-width: 900px; 
        margin: 0 auto; 
        width: 100%;
        animation: fadeIn 0.5s ease-out;
      }
      
      .msg-row.user { 
        flex-direction: row-reverse; 
      }
      
      .msg-bubble {
        padding: 1.25rem 1.5rem;
        border-radius: var(--radius-xl);
        max-width: 85%;
        box-shadow: var(--shadow-soft);
        line-height: 1.7;
        font-size: 1rem;
        position: relative;
        transition: all var(--trans-elegant);
      }
      
      .msg-bubble:hover {
        transform: translateY(-3px);
        box-shadow: var(--shadow-medium);
      }
      
      .msg-bubble.user { 
        background: var(--grad-orange-soft);
        color: var(--c-white); 
        border-top-right-radius: var(--radius-xs);
        box-shadow: var(--shadow-neon-subtle);
      }
      
      .msg-bubble.user:hover {
        box-shadow: var(--shadow-neon-orange);
      }
      
      .msg-bubble.model { 
        background: var(--c-dark-surface);
        color: var(--c-text-secondary); 
        border: 1px solid var(--c-dark-border);
        border-top-left-radius: var(--radius-xs);
        backdrop-filter: blur(10px);
      }
      
      .msg-bubble.model:hover {
        border-color: rgba(255, 96, 2, 0.28);
      }
      
      /* Markdown Styles inside Chat - Enhanced */
      .markdown-content p { 
        margin-bottom: 0.75rem;
        line-height: 1.7;
      }
      .markdown-content ul { 
        padding-left: 1.5rem; 
        margin-bottom: 0.75rem; 
        list-style-type: disc; 
      }
      .markdown-content li {
        margin-bottom: 0.375rem;
      }
      .markdown-content strong { 
        font-weight: 700;
        color: var(--c-text-primary);
      }
      .markdown-content code {
        background: rgba(255, 96, 2, 0.1);
        color: var(--c-orange-soft);
        padding: 0.25rem 0.5rem;
        border-radius: var(--radius-xs);
        font-size: 0.875em;
        font-family: 'Courier New', monospace;
        border: 1px solid rgba(255, 96, 2, 0.2);
      }
      .markdown-content pre {
        background: rgba(8, 8, 14, 0.8);
        border: 1px solid var(--c-dark-border);
        padding: var(--space-md);
        border-radius: var(--radius-md);
        overflow-x: auto;
        margin: var(--space-md) 0;
      }
      .markdown-content a {
        color: var(--c-orange-cesar);
        text-decoration: underline;
        transition: var(--trans-fast);
      }
      .markdown-content a:hover {
        color: var(--c-orange-vivid);
        text-shadow: 0 0 8px rgba(255, 119, 34, 0.4);
      }
      
      /* Glass Effect — Dark Futuristic */
      .glass {
        background: rgba(11, 11, 17, 0.8);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 96, 2, 0.12);
      }
      
      /* Gradient Text */
      .gradient-text {
        background: linear-gradient(135deg, var(--c-orange) 0%, var(--c-pink) 50%, var(--c-purple) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        font-weight: 800;
      }
      
      /* Skeleton Loading — Dark */
      .skeleton {
        background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.09) 50%, rgba(255,255,255,0.04) 75%);
        background-size: 200% 100%;
        animation: skeleton-loading 1.5s ease-in-out infinite;
      }
      
      @keyframes skeleton-loading {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
      
      /* Floating Animation */
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
      }
      
      .float {
        animation: float 3s ease-in-out infinite;
      }
      
      /* Focus Visible for Accessibility */
      *:focus-visible {
        outline: 3px solid var(--c-orange);
        outline-offset: 2px;
        border-radius: var(--radius-sm);
      }
      
      /* Selection */
      ::selection {
        background: rgba(255, 96, 2, 0.32);
        color: var(--c-orange-vivid);
      }
      
      /* Animation */
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      .animate-spin { animation: spin 1s linear infinite; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      .fade-in { animation: fadeIn 0.4s ease-out forwards; }

      /* Futuristic neon pulse */
      @keyframes neon-pulse {
        0%, 100% { box-shadow: 0 0 8px rgba(255, 96, 2, 0.3), 0 0 20px rgba(255, 96, 2, 0.1); }
        50% { box-shadow: 0 0 20px rgba(255, 96, 2, 0.55), 0 0 50px rgba(255, 96, 2, 0.2); }
      }
      .neon-pulse { animation: neon-pulse 2.5s ease-in-out infinite; }

      /* Data flicker effect */
      @keyframes data-flicker {
        0%, 95%, 100% { opacity: 1; }
        96% { opacity: 0.85; }
        97% { opacity: 1; }
        98% { opacity: 0.9; }
      }
      .data-flicker { animation: data-flicker 4s ease-in-out infinite; }

      /* Scanline sweep */
      @keyframes scanline {
        0% { transform: translateY(-100%); }
        100% { transform: translateY(100vh); }
      }
